# 修改前缀键为 Ctrl + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 修复 Vim 中 ESC 键的延迟问题 (非常重要！)
set -s escape-time 0

# 窗口和面板索引从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 垂直分割 (左右)
bind | split-window -h -c "#{pane_current_path}"

# 水平分割 (上下)
bind - split-window -v -c "#{pane_current_path}"


# 使用 Vim 风格的按键在面板间移动
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# -r 表示可重复按键，不需要每次都按前缀键
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind r source-file ~/.tmux.conf \; display "tmux config reload!"


# 开启 Vi 风格的键位
setw -g mode-keys vi

# 绑定 v 开始选择，y 复制
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 鼠标支持 (可选，虽然 Vim 用户尽量不用鼠标，但有时候滚轮很方便)
set -g mouse on


# 确保终端支持真彩色
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set-option -ga terminal-overrides ",*256col*:Tc"
# 针对亮色背景，加深未激活面板的边框颜色，不然很难看清分界线
set -g pane-border-style fg=colour244,bg=default
set -g pane-active-border-style fg=colour208,bg=default

# 插件列表
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @catppuccin_flavor "latte"
set -g @catppuccin_window_status_style "rounded"

set -g @catppuccin_window_default_text " #{pane_current_command}"
set -g @catppuccin_window_text " #{pane_current_command}"
set -g @catppuccin_window_current_text " #{pane_current_command}"
# Load catppuccin
run ~/.tmux/plugins/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run ~/.tmux/plugins/tpm/tpm
